<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .item {
      background : #0bd;
      color : #fff;
      margin: 10px;
      padding : 10px;
    }   /* 1.여기까지 실행하면 3줄에 박스표시됨   */  

    /* 2.이 후 추가해서 실행하면 1줄에 3개가 수평으로 표시됨 */ 
    .container {
       display: flex;   
       align-content: space-between;
       height: 300px;     /* 필수 100vh 높이를 지정합니다 */
       /* 실행후 화면크기를 왼쪽으로 줄여서 항목이 아래로 내려가는지 확인인
        stretch（초깃값）  부모 요소의 높이에 맞게 자식 요소의 높이를 늘여서 배치합니다.
        flex-start         부모 요소의 윗부분에 맞춰 배치합니다
        flex-end           부모 요소의 아랫부분에 맞춰 배치합니다
        center             중앙에 배치합니다.
        space-between      위아래 끝에 있는 요소를 끝에 붙이고, 남은 부분들은 균등한 공간을 형성한 상태로 배치합니다
        space—around       위아래 끝에 있는 여백도 포함해서 균등한 공간을 형성한 상태로 배치합니다.
       */       
    }

  </style>
</head>
<body>
  <!--align—content 여러 줄이 될 때의 맞춤  -->
  <div class="container">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
    <div class="item">Item 4</div>
    <div class="item">Item 5</div>
    <div class="item">Item 6</div>
    <div class="item">Item 7</div>
    <div class="item">Item 8</div>
  </div>


</body>
</html>
