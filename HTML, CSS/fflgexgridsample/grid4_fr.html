<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .item {
      background : #0bd;
      color : #fff; 
      padding : 10px;
    }   /* 1.여기까지 실행하면 6줄에 박스표시됨   */  

    /* 2.이 후 추가해서 실행하면 6줄이 출력됨됨 */ 
    .container {
       display: grid;   
       grid-template-columns: 1fr 1fr 1fr;  /* 한줄에 3개씩 2줄로 표시됨 */
       gap : 10px;
    }

  </style>
</head>
<body>
  <!-- CSS 그리드에서 사용할 수 있는 단위 “fr”
   grid-template-columns
   값을 “1fr 1fr 1fr”로 지정하면 1：1：1 비율로 그리드 아이템을 출력할 수 있습니다
   “fr”을 사용하면 화면의 너비에 맞게 늘어나고 줄어듭니다. 
   화면이 넓은 경우에는 그리드 아이템도 넓어집니다.
   면의 너비가 좁아지면 그에 맞게 그리드 아이템의 너비도 줄어듭니다.
    -->
  <!--  .container>.item*6>Item $ --> 
  <div class="container">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
    <div class="item">Item 4</div>
    <div class="item">Item 5</div>
    <div class="item">Item 6</div>
  </div>  


</body>
</html>
