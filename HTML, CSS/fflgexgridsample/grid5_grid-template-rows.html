<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .item {
      background : #0bd;
      color : #fff; 
      padding : 10px;
    }   /* 1.여기까지 실행하면 6줄에 박스표시됨   */  

    /* 2.이 후 추가해서 실행하면 6줄이 출력됨됨 */ 
    .container {
       display: grid;   
       grid-template-rows: 1fr 1fr 1fr;  /* 한줄에 3개씩 2줄로 표시됨 */
       gap : 10px;

       grid-template-rows: 200px 200px;  /* 추가: 그리드 아이템의 높이 두 줄로 200Px씩 지정   */
    }

  </style>
</head>
<body>
  <!-- 그리드 아이템（자식 요소）의 높이 “grid—template—rows 속성”
      그리드 아이템의 높이는 grid-template-rows 속성으로 지정합니다. 여러 줄을 만들고 싶을 때는 
      띄어쓰기로 구분해서 필요한 그리드 줄 수만큼 너비를 지정합니다.
      예를 들어 두 줄로 200Px씩 지정하고 싶다면 “200px 200px”이라고 작성합니다
    -->
  <!--  .container>.item*6>Item $ --> 
  <div class="container">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
    <div class="item">Item 4</div>
    <div class="item">Item 5</div>
    <div class="item">Item 6</div>
  </div>  


</body>
</html>
