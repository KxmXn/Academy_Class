<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .item {
      background: #0bd;    /* web safe color  #00bbdd  */ 
      color : #ffffff;   /* #fff */
      margin : 10px;
      padding : 10px;
    /*  width : 400px;  */
      float : left; 
    }

    
    .container::after {
      content : '';
      display: block;
      clear : both;   /*both:left + right*/
    }
    
 
  </style>
</head>
<body>
  <div class="container" >
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>'
  </div>
  
  <div class="div2" style="background: silver;">text</div>
</body>
</html>
