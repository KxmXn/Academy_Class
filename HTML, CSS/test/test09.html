<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
     /*   display : block    width, height 작동 */
     div  {  border : 1px solid   blue; width: 400px; height: 50px; } 
     /*   display : inline   width, height 작동X  */
     span {  border : 1px dotted  red; width: 400px; height: 50px; }
     p    {  border : 1px dashed  green; }
  </style>
</head>
<body>s
  <div>카리나</div>
  <div>윈터</div>
  <div>원영</div>
  <div>유진</div>
  
  <span>카리나</span>
  <span>윈터</span>
  <span>원영</span>
  <span>유진</span>
             
  <p>민지</p>
  <span>츄</span>
  <p>하니</p>
  <p>다니엘</p>
  <p>해린</p>
  <p>혜인</p>  

</body>
</html>
