<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {{
      box-sizing: border-box; 
      /* 전체 넓이에 border, padding, margin size플 포함X*/
    }
    div { 
      width:80%;
      margin:0 auto;
    }
    table, td {
      border-width: 1px;
      border-style: solid;
      border-color: black;
      border-collapse: collapse;
    }
    table {
      width : 100%;
    }
    td {
      text-align: center;
      /* height: 50px; */
      padding : 10px; 
    }
    h1 {
      text-align: center;
      margin : 60px 0px 60px 0;
    }

    .td1 { width : 20%; }
    .td2 { width : 15%; }
    .td3 { width : 50%; }
    .td4 { width : 15%; }
  </style>
</head>
<body>
  <div>
  <h1>동창회비 납입내역</h1>
  <table>
    <tr>
      <td class="td1">이름</td>
      <td class="td2">성별</td>
      <td class="td3">주소</td>
      <td class="td4">회비</td>    
    </tr>
    <tr>
      <td class="td1">최진혁</td>
      <td class="td2">남</td>
      <td rowspan="2">청주</td>
      <td class="td4">10000</td>    
    </tr>
    <tr>
      <td class="td1">제시카</td>
      <td class="td2">여</td>
  
      <td class="td4">5000</td>    
    </tr>
    <tr>
      <td colspan="3">합계</td>
      
      
      <td  class="td4">1500</td>    
    </tr>
  </table>
  </div>
  
</body>
</html>
