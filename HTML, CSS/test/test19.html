<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form action="a.html" method="get">
    <table>
      <tr>
        <td>성별</td>
        <td>
          <input type="radio" name="sex" value="male" id="male" />
          <label for="male">남자</label>
          <input type="radio" name="sex" value="female" id="female" />
          <label for="female">여자</label>
        </td>
      </tr>
      <tr>
        <td>취미</td>
        <td>
          <input type="checkbox" name="hobby" value="game" id="game" />
          <label for="game">게임</label>
          <input type="checkbox" name="hobby" value="swim" id="swim" />
          <label for="swim">수영</label>
          <input type="checkbox" name="hobby" value="golf" id="golf" />
          <label for="golf">골프</label>
          <input type="checkbox" name="hobby" value="gym" id="gym" />
          <label for="gym">쇠질</label>
        </td>
      </tr>
      <tr>
        <td>직업</td>
        <td>
          <select name="job" size="1">
            <option>선택</option>
            <option value="1">학생</option> 
            <option value="2" selected>직장인</option> 
            <option value="3">백수</option> 
          </select>

        </td>
      </tr>
      <tr>
        <td>자기소개</td>
        <td>
          <textarea name="info" rows="5" cols="80" maxlength="400" ></textarea>

        </td>
      </tr>
      <tr>
        <td colspan="2"><input type="submit" /></td>
      </tr>
    </table>
  </form>
</body>
</html>
